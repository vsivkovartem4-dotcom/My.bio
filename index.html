<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XXXTentacion - Save Me</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 40%, #4a4a4a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #ccc;
        }
        .card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .photo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #555;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .song-title {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .video {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 5px;
        }
        iframe {
            width: 100%;
            height: 200px;
            border: none;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Фото XXXTentacion -->
        <img class="photo" 
             src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/XXXTentacion_2018.jpg/800px-XXXTentacion_2018.jpg" 
             alt="XXXTentacion">

        <h1>XXXTENTACION</h1>
        <p class="song-title">Save Me</p>

        <!-- Трек Save Me с YouTube -->
        <div class="video">
            <iframe src="https://www.youtube.com/embed/R8V_iCgrQdU" 
                    title="XXXTentacion - Save Me" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>
    </div>
</body>
</html>
